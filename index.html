<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Sorpresa para Tefy! 🎁</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #8a2be2; --secondary: #ff00ff; --dark: #050505; }
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--dark); background-image: radial-gradient(circle, #1a1a2e 0%, #000 100%); font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: white; }
        
        .scene { width: 90%; max-width: 360px; height: 480px; perspective: 1200px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card.flipped { transform: rotateY(180deg); }

        .card-face { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        /* CARA FRONTAL */
        .front { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .gift-icon { font-size: 6rem; margin-bottom: 1rem; filter: drop-shadow(0 0 10px var(--secondary)); animation: bounce 2s infinite; }
        .front h1 { font-size: 2.4rem; margin: 0; color: #fff; text-shadow: 0 0 15px var(--primary); }
        .front p { font-size: 1.1rem; color: #aaa; margin: 1.5rem 0; }
        
        /* CARA TRASERA (ENTRADA) */
        .back { background-image: url('https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; transform: rotateY(180deg); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; position: relative; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 85%); z-index: 1; }
        .content { z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
        
        .artist { font-size: 3rem; font-weight: 900; letter-spacing: -1px; margin-top: 20px; color: #fff; line-height: 0.9; }
        .sub-text { font-size: 1.2rem; color: var(--secondary); font-weight: bold; margin-top: 10px; }
        .message { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; color: #fff; }

        .btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; width: 100%; box-shadow: 0 10px 20px rgba(138, 43, 226, 0.4); -webkit-appearance: none; margin-top: auto; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face front">
                <div class="gift-icon">🎁</div>
                <h1>¡Feliz Cumpleaños Tefy!</h1>
                <p>Toca el botón para revelar tu sorpresa...</p>
                <button class="btn" onclick="flip()">VER MI REGALO</button>
            </div>
            
            <div class="card-face back">
                <div class="overlay"></div>
                <div class="content">
                    <div>
                        <div style="letter-spacing: 4px; font-size: 0.8rem; opacity: 0.8;">ADMIT ONE</div>
                        <div class="artist">JONAS<br>BROTHERS</div>
                        <div class="sub-text">WORLD TOUR 2026</div>
                    </div>
                    <div class="message">
                        ¡Te ganaste una entrada para el concierto! 🎸✨
                        <div style="font-size: 0.9rem; font-weight: normal; margin-top: 10px; opacity: 0.7;">Feliz cumple, Tefy</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function flip() {
            document.getElementById('card').classList.add('flipped');
            lanzarConfetti();
        }

        function lanzarConfetti() {
            const end = Date.now() + 4000;
            const colors = ['#8a2be2', '#ff00ff', '#ffffff'];
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
