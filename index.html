<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños! 🎂</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f172a; font-family: system-ui, -apple-system, sans-serif; color: white; overflow: hidden; }
        .card { text-align: center; background: rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 2rem; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); width: 85%; max-width: 350px; animation: fadeIn 1.5s ease-out; }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(to right, #ff7eb3, #ff758c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; opacity: 0.9; margin: 1.5rem 0; }
        .btn { background: #ff758c; color: white; border: none; padding: 1rem 2rem; border-radius: 3rem; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4); cursor: pointer; -webkit-appearance: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <span>🎂</span>
        <h1>¡Felicidades!</h1>
        <p>Hoy es un día especial y quería darte una pequeña sorpresa digital...</p>
        <button class="btn" onclick="lanzarConfetti()">¡Toca aquí!</button>
    </div>

    <script>
        function lanzarConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff7eb3', '#ff758c', '#ffffff'] });
            setTimeout(() => {
                alert("¡Que pases un día increíble! 🎈✨");
            }, 500);
        }
        // Lluvia inicial
        window.onload = () => { lanzarConfetti(); };
    </script>
</body>
</html>
