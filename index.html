<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡SORPRESA JONAS! 🎸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden; }
        .card { text-align: center; background: rgba(255, 255, 255, 0.05); padding: 2.5rem; border-radius: 2rem; backdrop-filter: blur(15px); border: 2px solid #7a5df5; width: 85%; max-width: 350px; box-shadow: 0 0 30px rgba(122, 93, 245, 0.3); }
        h1 { font-size: 2.2rem; margin: 0; color: #7a5df5; text-shadow: 0 0 10px rgba(122, 93, 245, 0.5); }
        p { font-size: 1.2rem; margin: 1.5rem 0; line-height: 1.4; color: #e0e0e0; }
        .gift-box { font-size: 4rem; margin-bottom: 10px; display: block; }
        .btn { background: linear-gradient(45deg, #7a5df5, #ff4b5c); color: white; border: none; padding: 1.2rem 2rem; border-radius: 3rem; font-weight: bold; font-size: 1.1rem; width: 100%; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); -webkit-appearance: none; }
    </style>
</head>
<body>
    <div class="card">
        <span class="gift-box">🎁</span>
        <h1>¡Feliz Cumpleaños!</h1>
        <p>Prepárate porque esto no es una broma...</p>
        <button class="btn" onclick="revelarRegalo()">¡Toca para ver tu regalo!</button>
    </div>

    <script>
        function lanzarConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#7a5df5', '#ff4b5c'] });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#7a5df5', '#ff4b5c'] });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function revelarRegalo() {
            lanzarConfetti();
            setTimeout(() => {
                alert("✨ ¡¡TE GANASTE UNA ENTRADA A LOS JONAS BROTHERS!! ✨\n\n🎸 ¡Nos vemos en el concierto! 🎸");
            }, 500);
        }
    </script>
</body>
</html>
